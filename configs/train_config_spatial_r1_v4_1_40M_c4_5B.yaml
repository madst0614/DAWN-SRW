# DAWN Spatial-R1 v4.1 -- clean activation × intensity factorisation
#
# Gate = activation × intensity
#   activation = sigmoid(SHARPNESS · (raw - ACTIVATION_THRESHOLD))
#   intensity  = EPSILON + MAX_INTENSITY · sigmoid(score)
# Dynamic tau:
#   alpha  = MAX_ALPHA · sigmoid(raw_alpha)  (sigmoid-capped)
#   shift  = -alpha / (s_std + 1e-6)
# Embedding forward-normalized (unit) so neurons = pure direction.
# Dead threshold raised to 0.01 for the new gate scale.
#
# Projection-level dropouts kept at 0.0 (same rationale as v4.0.5/6).

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v4.1"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.0              # emb / attn-softmax / attn-out / know-out
  gradient_checkpointing: true

  d_route: 128
  n_qk: 1580
  n_v: 2600
  n_know: 25200
  router_dropout: 0.0       # proj_attn / proj_know

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.0
  # v4.1 physical constants (exposed; defaults match the module-level
  # values in models/dawn_spatial_v41_exp.py).
  sharpness: 50.0
  activation_threshold: 0.5
  epsilon: 1.0e-4
  max_alpha: 1.0
  max_intensity: 10.0
  tau_alpha_init: 0.1          # initial alpha (pre-cap) ≈ 0.1
  dead_penalty_weight: 0.05
  dead_penalty_threshold: 0.01 # raised from v4.0.6's 1e-4 for new gate scale
  n_chunks_know: 1
  n_chunks_qk: 1
  n_chunks_v: 1
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v4.1_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v4.1_40M_c4_5B
