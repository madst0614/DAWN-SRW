# DAWN Spatial-R1 v3.6 -- Threshold Gate + F-R Basis Dynamic Synthesis
# 21K sense neurons + M basis F-R emit. Neuron pattern -> basis weights.

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v3.6.0"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true

  d_bottleneck: 64
  n_qk: 1570
  n_v: 2620
  n_know: 21000
  n_basis_qk: 32
  n_basis_v: 32
  n_basis_know: 256
  max_k_qk: 157
  max_k_v: 262
  max_k_know: 1536
  router_dropout: 0.1

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.00002
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v3.6_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v3.6_40M_c4_5B

# Parameter budget (~31M):
#   Sense emb: (1570+2620+21000) x 64 = 1.61M
#   F-R basis:
#     QK:  32 x 384 x 64 x 2 = 1.57M
#     V:   32 x 384 x 64 x 2 = 1.57M
#     Know: 256 x 384 x 64 x 2 = 12.58M
#   Router proj+tau: ~0.2M
#   Blocks (LN x2 + O) x12: 1.79M
#   Embeddings: 11.92M
#   Total: ~31.2M
