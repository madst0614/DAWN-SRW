# DAWN Spatial-R1 v3.6 -- Threshold Gate + Feature-Restore Emit
# Sense: emb[N,64]. Emit: feature_fn[N,384,64] + restore_fn[N,64,384].
# Neuron counts reduced for F-R param budget.

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v3.6.0"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true

  d_bottleneck: 64
  n_qk: 128
  n_v: 128
  n_know: 256
  max_k_qk: 32
  max_k_v: 32
  max_k_know: 64
  router_dropout: 0.1

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.00002
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v3.6_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v3.6_40M_c4_5B

# Parameter budget (~39M):
#   QK:   emb[128,64]=8K + f[128,384,64]=3.15M + r[128,64,384]=3.15M = 6.3M
#   V:    same as QK = 6.3M
#   Know: emb[256,64]=16K + f[256,384,64]=6.29M + r[256,64,384]=6.29M = 12.6M
#   Router proj+tau: ~0.1M
#   Blocks (LN x2 + O_proj) x12: 1.79M
#   Embeddings (tok + pos): 11.92M
#   Total: ~39.0M
