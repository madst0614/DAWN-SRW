# DAWN Spatial-R1 v3.2 -- Full Matmul (v17.1 pattern), 40M Scale, 5B tokens
# Dense matmul scoring + sparse gate. No gather/cell/distance.

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v3.2.0"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true

  n_qk: 3140
  n_v: 5240
  n_know: 42000
  max_k_qk: 157
  max_k_v: 262
  max_k_know: 1536
  router_dropout: 0.1

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.00002
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v3.2_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v3.2_40M_c4_5B
