# DAWN Spatial-R1 v4.0.5 -- bidirectional gate dropout (peak strength)
# On top of v4.0.3 (Σz^+ denominator, no emb forward norm):
#   drop  (z > 0): Bernoulli(gate_drop_rate)  → z := -1.0
#   boost (z < 0): Bernoulli(gate_boost_rate) → z := z_peak
# Off in eval (deterministic short-circuits both probs to 0).
#
# Projection-level dropouts zeroed (dropout → emb/attn/know paths,
# router_dropout → proj_attn/proj_know). Reasoning:
#   - Modern LLM pretraining (Llama, GPT) uses dropout=0 for
#     single-epoch large-data regimes; this is a ~5B-token run.
#   - DAWN's router has limited capacity for 25200-neuron
#     discrimination; projection noise hurts routing precision.
#   - Gate-level drop/boost (DAWN-specific, via gate_drop_rate /
#     gate_boost_rate) is the replacement regularizer — applied to
#     z before Φ/gate, directly on the routing decision.
# safe_dropout short-circuits when rate == 0.0 so there is no
# wasted compute.

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v4.0.5"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.0              # v4.0.5: emb / attn-softmax / attn-out / know-out
  gradient_checkpointing: true

  d_route: 128
  n_qk: 1580
  n_v: 2600
  n_know: 25200
  router_dropout: 0.0       # v4.0.5: proj_attn / proj_know

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.0
  # v4.0.5 bidirectional gate dropout
  gate_drop_rate: 0.005
  gate_boost_rate: 0.005
  n_chunks_know: 1
  n_chunks_qk: 1
  n_chunks_v: 1
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v4.0.5_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v4.0.5_40M_c4_5B
